<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>影视设备打分</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <script>
    // Catch ALL errors (syntax errors included)
    window.onerror = function(msg, url, line, col, err) {
      document.getElementById("app").innerHTML =
        '<div class="error-box" style="margin:20px;padding:20px">' +
        '<h3 style="color:#DC2626;margin-bottom:8px">JavaScript Error</h3>' +
        '<div style="font-size:14px;margin-bottom:8px">' + msg + '</div>' +
        '<pre style="font-size:12px;background:#FEF2F2;padding:12px;border-radius:4px;overflow:auto;max-height:300px;text-align:left">' +
        'File: ' + url + '\nLine: ' + line + '\nCol: ' + col + '\nStack: ' + (err ? err.stack : 'N/A') +
        '</pre></div>';
      return true;
    };
  </script>
  <header class="app-header">
    <h1>🎬 影视设备打分</h1>
    <nav class="nav">
      <a data-page="home" onclick="page.go('home')">首页</a>
      <a data-page="bodyList" onclick="page.go('bodyList',{})">机身</a>
      <a data-page="lensList" onclick="page.go('lensList',{})">镜头</a>
      <a data-page="recommend" onclick="page.go('recommend',{})" style="color:#0369A1;font-weight:700">🎯 推荐</a>
      <a data-page="combo" onclick="page.go('combo',{})">评分</a>
      <a data-page="search" onclick="page.go('search',{})">搜索</a>
    </nav>
  </header>
  <main class="app-main" id="app">
    <div style="text-align:center;padding:80px 0;color:#999">加载中...</div>
  </main>
  <script src="js/data/bodies.js"></script>
  <script src="js/data/lenses.js"></script>
  <script src="js/data/scoring.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
